name: BriefCase Package Deployment
on:
    workflow_dispatch:
    push:
        branches:
            - master
            - feature/*
        paths:
          - src/**
jobs:
    build-windows:
      runs-on: windows-latest

      steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Checkout LFS objects
        run: git lfs checkout
       
      - name: Setup Python 3.11.9
        uses:  actions/setup-python@v3
        with:
         python-version: '3.11.9'
            
      - name: Activate virtual environment
        run: | 
         python -m venv .venv
         .venv\Scripts\activate.bat
         python -m pip install briefcase

      - name: Install Dependencies
        run: python -m pip install -r requirements.txt

      - name: Briefcase Package
        run: | 
         briefcase package -u
         dir  .\dist\
      
      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
            name: PIIE.msi
            path: .\dist\PIIE-1.0.msi

    build-macos:
      runs-on: self-hosted

      steps:
        - uses: atos-actions/clean-self-hosted-runner@v1
          if: ${{ always() }} 
         
        - name: Checkout repository
          uses: actions/checkout@v5
          with:
            lfs: true

        - name: Checkout LFS objects
          run: git lfs checkout

        - name: Setup Python 3.11.9
          uses:  actions/setup-python@v3
          with:
            python-version: '3.11.9'
              
        - name: Activate virtual environment and install dependencies
          run: | 
            python -m venv .venv
          
        - name: Activate venv environment
          run: source .venv/bin/activate
          
        - name: Install Dependencies
          run: python -m pip install -r requirements.txt

        - name: Create Briefcase environment
          run: briefcase build --update-resources

        - name: Briefcase Package
          run: | 
            briefcase package -p pkg --no-notarize --identity C81E52C69F0D51161D04C97558CE624A2C48480B --installer-identity 19A2C1C2EE4341C3E1F630ECAB156319CB403650
        
        - name: Upload Artifact
          if: success()
          uses: actions/upload-artifact@v4
          with:
            name: PIIE.pkg
            path: ./dist/PIIE-1.0.pkg


    create_release:
      runs-on: ubuntu-latest
      needs: [ build-windows, build-macos]
      steps:
        - name: Get current date
          id: date
          run: echo "::set-output name=date::$(date +'%Y-%m-%d')"
        
        - name: Download Windows Artifacts
          uses: actions/download-artifact@v5
          with:
            name: | 
              PIIE.msi

        - name: Download MacOS Artifacts
          uses: actions/download-artifact@v5
          with:
            name: | 
              PIIE.pkg

        - name: Release
          uses: softprops/action-gh-release@v2
          with:
            name: PIIE-Scanner-${{ steps.date.outputs.date }}
            tag_name: ${{github.ref_name}}
            files: |
              PIIE-1.0.msi
              PIIE-1.0.pkg
            token: ${{ secrets.CAPSTONETOKEN }}
