name: BriefCase Package Deployment
on:
    push:
        branches:
            - master
jobs:
    build-windows:
      runs-on: windows-latest

      steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Checkout LFS objects
        run: git lfs checkout
       
      - name: Setup Python 3.11.9
        uses:  actions/setup-python@v3
        with:
         python-version: '3.11.9'
            
      - name: Activate virtual environment and install dependencies
        run: | 
         python -m venv .venv
         .venv\Scripts\activate.bat
         python -m pip install briefcase

      - name: Briefcase Package
        run: | 
         briefcase package -u
         dir  .\dist\

      
      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
            name: pii-scanner.msi
            path: .\dist\pii-scanner-1.0.msi

    create_release_windows:
        runs-on: ubuntu-latest
        needs: build-windows
        steps:
            - name: Download Windows Artifacts
              uses: actions/download-artifact@v5
              with:
                name: | 
                    pii-scanner.msi

            - name: Release
              uses: softprops/action-gh-release@v2
              with:
                name: PiiScanner Release
                tag_name: ${{github.ref_name}}
                files: |
                  pii-scanner-1.0.msi
                token: ${{ secrets.CAPSTONETOKEN }}

    build-macos:
        runs-on: macos-latest

        steps:
        - uses: actions/checkout@v4

        - name: Setup Python 3.9
          uses:  actions/setup-python@v3
          with:
           python-version: '3.11.9'
            
        - name: Activate virtual environment and install dependencies
          run: | 
           python -m venv .venv
        
        - name: Activate venv environment
          run: source .venv/bin/activate
        
        - name: Install Dependencies
          run: python -m pip install -r requirements.txt


